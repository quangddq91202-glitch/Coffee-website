<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử giao dịch | Coffee House</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #b48060; color: rgb(3, 2, 2);">

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-img-wrapper">
                    <img src="img/logo-Q&TCoffee.jpg" alt="Q&TCoffee Logo">
                </div>
                <span class="brand-name">Q&T Coffee</span>
            </a>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="index.html#about">Giới thiệu</a></li> 
				<li><a href="index.html#products">Sản phẩm</a></li>
                <li><a href="index.html#contacts">Liên hệ</a></li>
            </ul>
            
            <div class="nav-right">
                <button class="search-toggle-btn" onclick="toggleSearch()">
                    <i class="fas fa-search"></i>
                </button>
                <div class="nav-icons">
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </a>
                </div>
                
                <div id="nav-user-area">
                    <div id="auth-logged-out">
                        <a href="login.html" class="btn-login-nav">Đăng nhập</a>
                    </div>
                    <div id="auth-logged-in" style="display: none;">
                        <i class="fas fa-user-circle"></i>
                        <span id="user-name-display"></span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

   <div id="simple-search-bar" class="search-bar-hidden">
        <div class="container">
            <div class="search-wrapper-simple">
                <i class="fas fa-search"></i>
                <input type="text" id="product-search-input" 
                    placeholder="Nhập tên sản phẩm..." 
                    oninput="handleSearchInput()" 
                    onkeydown="handleSearchEnter(event)">
                <i class="fas fa-times" onclick="toggleSearch()" style="cursor:pointer"></i>
            </div>
            <div id="search-suggestions" class="suggestions-box"></div>
        </div>
    </div>

    <main class="container" style="margin-top: 150px; max-width: 900px; font-weight: bold;">
        <h2 style="color: #000000; text-align: center; margin-bottom: 40px; font-weight: 700; font-size: 2rem; text-transform: uppercase; letter-spacing: 1px;">Lịch Sử Giao Dịch</h2>
        
        <div id="history-container">
            </div>
    </main>
<style>
    /* --- MOBILE RESPONSIVE CHO HISTORY (767px trở xuống) --- */
/* --- STYLE CHUNG CHO HISTORY --- */
.history-item {
    background: #4f3422; /* Màu nâu đậm giống trang Cart */
    padding: 20px;
    border-radius: 20px; /* Bo góc lớn hơn cho giống Cart */
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    border: 1px solid #6d4c33; /* Viền nhẹ thay vì border-left dày */
    color: #fff; /* Chữ trắng để nổi bật trên nền nâu */
}

/* Các chi tiết bên trong */
.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 12px;
    margin-bottom: 12px;
}

.history-total {
    text-align: right;
    font-size: 1.2rem;
    color: #ff9f43; /* Màu cam nhấn giống logo/nút bấm */
    font-weight: bold;
    margin-top: 15px;
}

/* Khi lên Mobile (Dưới 767px) */
@media (max-width: 767px) {
    /* 1. Navbar: Đẩy 3 gạch sang phải cùng */
    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        justify-content: flex-end; /* Đẩy cụm icon sát lề phải */
    }

    .hamburger {
        order: 99; /* Luôn nằm cuối cùng bên phải */
        margin-left: 5px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
    }

    .search-toggle-btn { order: 1; }
    .nav-icons { order: 2; }
    #nav-user-area { order: 3; }

    /* 2. Menu sổ xuống */
    .nav-links {
        position: absolute;
        top: 100%;
        right: 0;
        width: 100%;
        background: #4f3422;
        flex-direction: column;
        max-height: 0;
        overflow: hidden;
        transition: 0.4s ease;
        z-index: 1000;
    }

    #menu-toggle:checked ~ .nav-links {
        max-height: 500px;
        padding: 20px 0;
    }

    /* Tối ưu History Item trên Mobile */
    .history-item {
        margin: 15px; /* Tạo khoảng cách với mép màn hình */
        padding: 15px;
    }

    .history-header {
        flex-direction: column; /* Mã đơn hàng bên trên, trạng thái bên dưới */
        align-items: flex-start;
        gap: 5px;
    }

    .history-status {
        align-self: flex-end; /* Đẩy chữ "Hoàn thành" sang phải */
        background: #03b34c;
        padding: 2px 10px;
        border-radius: 5px;
        font-size: 0.8rem;
    }
}
</style>

    <script src="js/auth.js"></script>
    <script>
        function renderHistory() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            const historyKey = `history_${currentUser.username}`;
            const history = JSON.parse(localStorage.getItem(historyKey)) || [];
            const container = document.getElementById('history-container');

            if (history.length === 0) {
                container.innerHTML = `<p style="text-align: center; opacity: 0.6;">Bạn chưa có giao dịch nào.</p>`;
                return;
            }

            container.innerHTML = history.map(order => `
                <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px ridge rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">
                        <div>
                            <span style="color: var(--accent); font-weight: bold;">${order.orderId}</span>
                            <br><small style="opacity: 0.6;">${order.date}</small>
                        </div>
                        <div style="text-align: right;">
                            <span style="background: #27ae60; padding: 3px 10px; border-radius: 5px; font-size: 0.8rem;">${order.status}</span>
                            <br><strong style="font-size: 1.2rem;">${order.total.toLocaleString()}đ</strong>
                        </div>
                    </div>
                    <div>
                        ${order.items.map(item => `
                            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px;">
                                <span>${item.name} x${item.quantity}</span>
                                <span>${(item.price * item.quantity).toLocaleString()}đ</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
