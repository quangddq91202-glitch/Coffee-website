<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành viên | Coffee House</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <a href="index.html" class="back-to-home">
        <i class="fas fa-arrow-left"></i> Quay lại trang chủ
    </a>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-form" id="login-form">
                <div class="auth-header">
                    <img src="img/logo-Q&TCoffee.jpg" alt="Q&TCoffee Logo">
                    <h2>Chào mừng đến với <br> Q&T Coffee</h2>
                </div>
                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-group">
                        <label>Tên đăng nhập / Email</label>
                        <input type="text" id="login-user" placeholder="  " required>
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <div class="password-wrapper">
                            <input type="password" id="login-pass" placeholder="********" required>
                            <i class="fas fa-eye-slash toggle-password"></i>
                        </div>
                    </div>
                    <div class="auth-options">
                        <label><input type="checkbox"> Ghi nhớ tôi</label>
                        <a href="#">Quên mật khẩu?</a>
                    </div>
                    <button type="submit" class="btn-auth">Đăng Nhập</button>
                </form>
                <p class="switch-auth">Chưa có tài khoản? <a href="javascript:void(0)" onclick="toggleAuth()">Đăng ký ngay</a></p>
            </div>

            <div class="auth-form hidden" id="register-form">
                <div class="auth-header">
                    <img src="img/logo-Q&TCoffee.jpg" alt="Logo">
                    <h2>Gia nhập đại gia đình</h2>
                    <p>Trở thành thành viên thân thiết ngay hôm nay</p>
                </div>
                <form onsubmit="handleAuth(event, 'register')">
                    <div class="input-group">
                        <label>Họ và Tên</label>
                        <input type="text" placeholder="  " required>
                    </div>
                    <div class="input-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" placeholder="  " required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="@gmail.com" required>
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" placeholder="Tối thiểu 6 ký tự" required>
                    </div>
                    <button type="submit" class="btn-auth">Tạo Tài Khoản</button>
                </form>
                <p class="switch-auth">Đã có tài khoản? <a href="javascript:void(0)" onclick="toggleAuth()">Đăng nhập tại đây</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
