<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | Coffee House</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #3d2b1f;"> 
   <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-img-wrapper">
                    <img src="img/logo-Q&TCoffee.jpg" alt="Q&TCoffee Logo">
                </div>
                <span class="brand-name">Q&T Coffee</span>
            </a>
            
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="index.html#about">Giới thiệu</a></li> 
				<li><a href="index.html#products">Sản phẩm</a></li>
                <li><a href="index.html#contacts">Liên hệ</a></li>
            </ul>
            
            <div class="nav-right">
                <button class="search-toggle-btn" onclick="toggleSearch()">
                    <i class="fas fa-search"></i>
                </button>
                <div class="nav-icons">
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </a>
                </div>
                
                <div id="nav-user-area">
                    <div id="auth-logged-out">
                        <a href="login.html" class="btn-login-nav">Đăng nhập</a>
                    </div>
                    <div id="auth-logged-in" style="display: none;">
                        <i class="fas fa-user-circle"></i>
                        <span id="user-name-display"></span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

   <div id="simple-search-bar" class="search-bar-hidden">
        <div class="container">
            <div class="search-wrapper-simple">
                <i class="fas fa-search"></i>
                <input type="text" id="product-search-input" 
                    placeholder="Nhập tên sản phẩm..." 
                    oninput="handleSearchInput()" 
                    onkeydown="handleSearchEnter(event)">
                <i class="fas fa-times" onclick="toggleSearch()" style="cursor:pointer"></i>
            </div>
            <div id="search-suggestions" class="suggestions-box"></div>
        </div>
    </div>

    <main class="container" style="margin-top: 120px; padding-bottom: 50px;">
        <h2 style="color: #ffffffff; margin-bottom: 30px; text-align: center; font-size: 2.5rem;">Giỏ Hàng Của Bạn</h2>
        
        <div class="cart-wrapper" style="display: flex; gap: 30px; flex-wrap: wrap;">
            <div class="cart-items-container" style="flex: 2; min-width: 350px;">
                <div id="cart-list">
                    </div>
            </div>

            <div class="cart-summary" style="flex: 1; min-width: 300px;">
                <div style="background: #f8e08b; padding: 30px; border-radius: 20px; position: sticky; top: 100px;">
                    <h3 style="color: #3d2b1f; margin-bottom: 20px; border-bottom: 2px solid #3d2b1f; padding-bottom: 10px;">Tổng Đơn Hàng</h3>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <span>Tạm tính:</span>
                        <span id="total-price">0đ</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <span>Phí vận chuyển:</span>
                        <span>Miễn phí</span>
                    </div>
                    <hr style="margin-bottom: 15px; border: 0.5px solid rgba(0,0,0,0.1);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: bold; font-size: 1.2rem; color: #3d2b1f;">
                        <span>Tổng cộng:</span>
                        <span id="final-price" style="color: #b32d2d;">0đ</span>
                    </div>
                    <button class="btn-checkout" onclick="processCheckout()" style="width: 100%; padding: 15px; background: #3d2b1f; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;">
                        THANH TOÁN NGAY
                    </button>
                    <a href="index.html#products" style="display: block; text-align: center; margin-top: 15px; color: #5d5434; text-decoration: none; font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm
                    </a>
                </div>
            </div>
        </div>
    </main>
    <style>
/* --- MOBILE RESPONSIVE CHO CART (767px trở xuống) --- */
@media (max-width: 767px) {
    /* 1. Navbar: Đẩy 3 gạch sang phải cùng */
    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        justify-content: flex-end; /* Đẩy cụm icon sát lề phải */
    }

    .hamburger {
        order: 99; /* Luôn nằm cuối cùng bên phải */
        margin-left: 5px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
    }

    .search-toggle-btn { order: 1; }
    .nav-icons { order: 2; }
    #nav-user-area { order: 3; }

    /* 2. Menu sổ xuống */
    .nav-links {
        position: absolute;
        top: 100%;
        right: 0;
        width: 100%;
        background: #4f3422;
        flex-direction: column;
        max-height: 0;
        overflow: hidden;
        transition: 0.4s ease;
        z-index: 1000;
    }

    #menu-toggle:checked ~ .nav-links {
        max-height: 500px;
        padding: 20px 0;
    }

    /* 3. Giỏ hàng: Chuyển sang dạng Thẻ (Card) */
    .cart-wrapper {
        flex-direction: column; /* Đẩy bảng tổng tiền xuống dưới danh sách sản phẩm */
    }

    .cart-item {
        flex-direction: column !important; /* Xếp dọc các thành phần trong 1 sản phẩm */
        align-items: flex-start !important;
        position: relative;
        padding: 15px !important;
    }

    .cart-item img {
        width: 100% !important;
        height: 180px !important;
        object-fit: cover;
        margin-bottom: 10px;
    }

    /* Đẩy giá tiền và bộ tăng giảm số lượng */
    .cart-item div[style*="flex: 1"] {
        width: 100%;
        margin-bottom: 10px;
    }

    /* Nút xóa sản phẩm đưa lên góc trên bên phải của thẻ */
    .cart-item button[onclick*="removeItem"] {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255, 255, 255, 0.8) !important;
        border-radius: 50%;
        padding: 5px 10px;
    }

    /* Bảng tổng tiền (Summary) */
    .cart-summary {
        width: 100% !important;
        margin-top: 20px;
    }
    
    .cart-summary div {
        position: static !important; /* Bỏ sticky trên mobile để không bị đè nội dung */
    }
}
</style>

    <script src="js/auth.js"></script>
    <script>
        // Logic riêng cho trang giỏ hàng
        function renderCart() {
            const cartList = document.getElementById('cart-list');
            const cartData = JSON.parse(localStorage.getItem('coffee_cart')) || [];
            
            if (cartData.length === 0) {
                cartList.innerHTML = `
                    <div style="text-align: center; background: white; padding: 50px; border-radius: 20px;">
                        <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ddd; margin-bottom: 20px;"></i>
                        <p style="color: #666;">Giỏ hàng của bạn đang trống.</p>
                    </div>`;
                return;
            }

            let html = '';
            let total = 0;

            cartData.forEach((item, index) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `
                    <div class="cart-item" style="background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                        <img src="${item.img}" style="width: 80px; height: 80px; object-fit: contain; background: #f9f9f9; border-radius: 10px;">
                        <div style="flex: 1;">
                            <h4 style="margin: 0; color: #3d2b1f;">${item.name}</h4>
                            <p style="color: #b32d2d; font-weight: bold; margin: 5px 0;">${item.price.toLocaleString()}đ</p>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button onclick="changeQty(${index}, -1)" style="width: 30px; height: 30px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px;">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="changeQty(${index}, 1)" style="width: 30px; height: 30px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px;">+</button>
                        </div>
                        <div style="width: 100px; text-align: right; font-weight: bold; color: #3d2b1f;">
                            ${subtotal.toLocaleString()}đ
                        </div>
                        <button onclick="removeItem(${index})" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 1.2rem;">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });

            cartList.innerHTML = html;
            document.getElementById('total-price').innerText = total.toLocaleString() + 'đ';
            document.getElementById('final-price').innerText = total.toLocaleString() + 'đ';
        }

        function changeQty(index, delta) {
            let cartData = JSON.parse(localStorage.getItem('coffee_cart'));
            cartData[index].quantity += delta;
            if (cartData[index].quantity < 1) cartData[index].quantity = 1;
            localStorage.setItem('coffee_cart', JSON.stringify(cartData));
            renderCart();
            updateCartUI(); // Gọi hàm từ auth.js để cập nhật badge trên nav
        }

        function removeItem(index) {
            if (confirm("Xóa sản phẩm này khỏi giỏ hàng?")) {
                let cartData = JSON.parse(localStorage.getItem('coffee_cart'));
                cartData.splice(index, 1);
                localStorage.setItem('coffee_cart', JSON.stringify(cartData));
                renderCart();
                updateCartUI();
            }
        }

        function checkout() {
            alert("Cảm ơn bạn đã đặt hàng! Đơn hàng của bạn đang được xử lý.");
            localStorage.removeItem('coffee_cart');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
